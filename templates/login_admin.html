<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            margin-top: 5vh;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
        }
        .login-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .login-icon i {
            font-size: 50px;
            color: white;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Admin Login</h2>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('signin_as') }}">Back to Sign-In Options</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Success/Error Popup Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-4">
                    <div id="modalIcon" class="mb-3"></div>
                    <h5 id="modalTitle" class="mb-3"></h5>
                    <p id="modalMessage" class="mb-4"></p>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalButton">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Enhanced form submission with popup notifications
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            submitBtn.disabled = true;
            
            // Create FormData
            const formData = new FormData(this);
            
            // Submit form
            fetch(window.location.href, {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(html => {
                // Parse response to check for success/error
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const alerts = doc.querySelectorAll('.alert');
                
                if (alerts.length > 0) {
                    const alert = alerts[0];
                    const isSuccess = alert.classList.contains('alert-success');
                    const message = alert.textContent.trim();
                    
                    showNotificationPopup(
                        isSuccess ? 'success' : 'error',
                        isSuccess ? 'Admin Login Successful!' : 'Login Failed',
                        message,
                        isSuccess
                    );
                    
                    if (isSuccess) {
                        // Redirect after 2 seconds
                        setTimeout(() => {
                            window.location.href = '/admin-dashboard';
                        }, 2000);
                    }
                } else {
                    // Check if redirected (successful login)
                    if (html.includes('admin-dashboard') || html.includes('Admin Dashboard')) {
                        showNotificationPopup(
                            'success',
                            'Admin Access Granted!',
                            'Welcome to the admin panel. Redirecting to dashboard...',
                            true
                        );
                        
                        setTimeout(() => {
                            window.location.href = '/admin-dashboard';
                        }, 2000);
                    } else {
                        showNotificationPopup(
                            'error',
                            'Access Denied',
                            'Invalid admin credentials. Please check your email and password.',
                            false
                        );
                    }
                }
            })
            .catch(error => {
                showNotificationPopup(
                    'error',
                    'Network Error',
                    'Unable to connect to the server. Please check your internet connection and try again.',
                    false
                );
            })
            .finally(() => {
                // Reset button state
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        });
        
        function showNotificationPopup(type, title, message, isSuccess) {
            const modal = document.getElementById('notificationModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButton = document.getElementById('modalButton');
            
            // Set icon and colors based on type
            if (type === 'success') {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745;"><i class="fas fa-shield-check"></i></div>';
                modalTitle.style.color = '#28a745';
                modalButton.className = 'btn btn-success';
                modalButton.textContent = 'Continue';
            } else {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #dc3545;"><i class="fas fa-shield-exclamation"></i></div>';
                modalTitle.style.color = '#dc3545';
                modalButton.className = 'btn btn-danger';
                modalButton.textContent = 'Try Again';
            }
            
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            // Show modal
            const bsModal = new bootstrap.Modal(modal);
            bsModal.show();
            
            // Add success animation
            if (isSuccess) {
                setTimeout(() => {
                    modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745; animation: bounce 0.6s;"><i class="fas fa-shield-check"></i></div>';
                }, 100);
            }
        }
        
        // Add bounce animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 20%, 60%, 100% { transform: translateY(0); }
                40% { transform: translateY(-20px); }
                80% { transform: translateY(-10px); }
            }
            
            .modal-content {
                border-radius: 15px;
                overflow: hidden;
            }
            
            .modal-body {
                background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
