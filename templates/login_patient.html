<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            margin-top: 5vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow:
                0 25px 50px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow:
                0 35px 70px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .login-icon i {
            font-size: 35px;
            color: white;
        }

        h2 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .form-label i {
            margin-right: 8px;
            color: #667eea;
            width: 16px;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 0.95);
            transform: translateY(-2px);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .login-links {
            text-align: center;
            margin-top: 30px;
        }

        .login-links p {
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }

        .login-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .login-links a:hover::after {
            width: 100%;
            left: 0;
        }

        .login-links a:hover {
            color: #764ba2;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        /* Loading animation */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Typing tooltips */
        .typing-tooltip {
            position: absolute;
            background: linear-gradient(135deg, #8B5CF6 0%, #A855F7 50%, #C084FC 100%);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 300px;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .typing-tooltip.show {
            opacity: 1;
            visibility: visible;
        }

        .typing-tooltip::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #8B5CF6;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 30px;
                margin: 20px;
            }

            h2 {
                font-size: 24px;
            }

            .login-icon {
                width: 70px;
                height: 70px;
            }

            .login-icon i {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-injured"></i>
                </div>
                <h2>Patient Login</h2>
                <p class="login-subtitle">Access your healthcare dashboard</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" class="form-control" name="email" required placeholder="Enter your email"
                        data-tooltip="Enter your registered patient email address.">
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" name="password" required
                        placeholder="Enter your password" data-tooltip="Enter your secure password.">
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In to Dashboard
                </button>
            </form>

            <div class="login-links">
                <p>Don't have an account? <a href="{{ url_for('signup_patient') }}">Create Account</a></p>
                <p><a href="{{ url_for('signin_as') }}">← Back to Role Selection</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Success/Error Popup Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-4">
                    <div id="modalIcon" class="mb-3"></div>
                    <h5 id="modalTitle" class="mb-3"></h5>
                    <p id="modalMessage" class="mb-4"></p>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalButton">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Typing tooltips functionality
        let currentTooltip = null;

        function createTooltip(element, text) {
            // Remove any existing tooltips first
            const existingTooltips = document.querySelectorAll('.typing-tooltip');
            existingTooltips.forEach(tooltip => {
                if (tooltip.parentNode) {
                    tooltip.parentNode.removeChild(tooltip);
                }
            });

            const tooltip = document.createElement('div');
            tooltip.className = 'typing-tooltip';
            tooltip.textContent = text;

            const rect = element.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

            tooltip.style.position = 'absolute';
            tooltip.style.left = (rect.left + scrollLeft) + 'px';
            tooltip.style.top = (rect.bottom + scrollTop + 10) + 'px';
            tooltip.style.zIndex = '10000';

            document.body.appendChild(tooltip);

            // Show tooltip with animation
            setTimeout(() => {
                tooltip.classList.add('show');
            }, 10);

            return tooltip;
        }

        function hideTooltip() {
            if (currentTooltip) {
                currentTooltip.classList.remove('show');
                setTimeout(() => {
                    if (currentTooltip && currentTooltip.parentNode) {
                        currentTooltip.parentNode.removeChild(currentTooltip);
                    }
                    currentTooltip = null;
                }, 300);
            }
        }

        // Add event listeners to all form inputs with data-tooltip
        document.addEventListener('DOMContentLoaded', function () {
            const inputs = document.querySelectorAll('[data-tooltip]');

            inputs.forEach((input) => {
                input.addEventListener('focus', function (e) {
                    e.stopPropagation();
                    hideTooltip();
                    const tooltipText = this.getAttribute('data-tooltip');
                    if (tooltipText) {
                        currentTooltip = createTooltip(this, tooltipText);
                        currentTooltip.ownerInput = this;
                    }
                });

                input.addEventListener('blur', function (e) {
                    e.stopPropagation();
                    setTimeout(() => {
                        if (currentTooltip && currentTooltip.ownerInput === this) {
                            hideTooltip();
                        }
                    }, 200);
                });

                input.addEventListener('input', function (e) {
                    e.stopPropagation();
                    if (currentTooltip && currentTooltip.ownerInput === this) {
                        const tooltipText = this.getAttribute('data-tooltip');
                        if (tooltipText && currentTooltip.textContent !== tooltipText) {
                            currentTooltip.textContent = tooltipText;
                        }
                    }
                });
            });

            document.addEventListener('click', function (e) {
                if (!e.target.hasAttribute('data-tooltip')) {
                    hideTooltip();
                }
            });
        });

        // Enhanced form submission with popup notifications
        document.querySelector('form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            submitBtn.disabled = true;

            // Create FormData
            const formData = new FormData(this);

            // Submit form
            fetch(window.location.href, {
                method: 'POST',
                body: formData
            })
                .then(response => response.text())
                .then(html => {
                    // Parse response to check for success/error
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const alerts = doc.querySelectorAll('.alert');

                    if (alerts.length > 0) {
                        const alert = alerts[0];
                        const isSuccess = alert.classList.contains('alert-success');
                        const message = alert.textContent.trim();

                        showNotificationPopup(
                            isSuccess ? 'success' : 'error',
                            isSuccess ? 'Login Successful!' : 'Login Failed',
                            message,
                            isSuccess
                        );

                        if (isSuccess) {
                            // Redirect after 2 seconds
                            setTimeout(() => {
                                window.location.href = '/patient-dashboard';
                            }, 2000);
                        }
                    } else {
                        // Check if redirected (successful login)
                        if (html.includes('dashboard') || html.includes('patient-dashboard')) {
                            showNotificationPopup(
                                'success',
                                'Login Successful!',
                                'Welcome back! Redirecting to your dashboard...',
                                true
                            );

                            setTimeout(() => {
                                window.location.href = '/patient-dashboard';
                            }, 2000);
                        } else {
                            showNotificationPopup(
                                'error',
                                'Login Failed',
                                'Invalid email or password. Please try again.',
                                false
                            );
                        }
                    }
                })
                .catch(error => {
                    showNotificationPopup(
                        'error',
                        'Network Error',
                        'Unable to connect to the server. Please check your internet connection and try again.',
                        false
                    );
                })
                .finally(() => {
                    // Reset button state
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                });
        });

        function showNotificationPopup(type, title, message, isSuccess) {
            const modal = document.getElementById('notificationModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButton = document.getElementById('modalButton');

            // Set icon and colors based on type
            if (type === 'success') {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745;"><i class="fas fa-check-circle"></i></div>';
                modalTitle.style.color = '#28a745';
                modalButton.className = 'btn btn-success';
                modalButton.textContent = 'Continue';
            } else {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #dc3545;"><i class="fas fa-exclamation-circle"></i></div>';
                modalTitle.style.color = '#dc3545';
                modalButton.className = 'btn btn-danger';
                modalButton.textContent = 'Try Again';
            }

            modalTitle.textContent = title;
            modalMessage.textContent = message;

            // Show modal
            const bsModal = new bootstrap.Modal(modal);
            bsModal.show();

            // Add success animation
            if (isSuccess) {
                setTimeout(() => {
                    modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745; animation: bounce 0.6s;"><i class="fas fa-check-circle"></i></div>';
                }, 100);
            }
        }

        // Add bounce animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 20%, 60%, 100% { transform: translateY(0); }
                40% { transform: translateY(-20px); }
                80% { transform: translateY(-10px); }
            }
            
            .modal-content {
                border-radius: 15px;
                overflow: hidden;
            }
            
            .modal-body {
                background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
