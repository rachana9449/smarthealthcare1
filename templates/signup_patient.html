<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up as Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .form-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-label {
            font-weight: 600;
            color: #555;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
        }

        /* Hide navbar tooltips on signup pages */
        .navbar-tooltip {
            display: none !important;
        }

        /* Typing tooltips */
        .typing-tooltip {
            position: absolute;
            background: linear-gradient(135deg, #8B5CF6 0%, #A855F7 50%, #C084FC 100%);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 300px;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .typing-tooltip.show {
            opacity: 1;
            visibility: visible;
        }

        .typing-tooltip::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #8B5CF6;
        }

        .form-control, .form-select {
            position: relative;
        }

        .form-group {
            position: relative;
        }

        /* Enhanced form styling to match the screenshot */
        .form-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .form-label i:first-child {
            margin-right: 8px;
            color: #667eea;
            width: 16px;
        }

        .form-control {
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-select {
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
        }

        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        /* Pulse animation for help icons */
        @keyframes helpPulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .help-icon.pulse {
            animation: helpPulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2><i class="fas fa-user-injured"></i> SIGN UP AS PATIENT</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input type="text" class="form-control" name="name" required 
                           data-tooltip="Enter your complete legal name as it appears on your ID documents.">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" class="form-control" name="email" required
                           data-tooltip="Use a valid email address. This will be your login username and where you'll receive appointment notifications.">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" class="form-control" name="password" required
                           data-tooltip="Create a secure password with at least 6 characters. Use a mix of letters and numbers for better security.">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-phone"></i> Phone
                    </label>
                    <input type="tel" class="form-control" name="phone" required
                           data-tooltip="Enter your primary contact number. Doctors may use this for urgent consultations or appointment confirmations.">
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-calendar"></i> Age
                        </label>
                        <input type="number" class="form-control" name="age" required
                               data-tooltip="Enter your current age in years. This helps doctors provide age-appropriate medical advice.">
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-venus-mars"></i> Gender
                        </label>
                        <select class="form-select" name="gender" required
                                data-tooltip="Select your gender. This information is important for gender-specific medical conditions and treatments.">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-tint"></i> Blood Group
                    </label>
                    <select class="form-select" name="blood_group"
                            data-tooltip="Select your blood group if known. This is crucial for emergency situations and blood transfusions. Leave blank if unknown.">
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-map-marker-alt"></i> Address
                    </label>
                    <textarea class="form-control" name="address" rows="2" required
                              data-tooltip="Enter your complete address including city and state. This helps doctors understand your location for in-person consultations."></textarea>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <p>Already have an account? <a href="{{ url_for('login_patient') }}">Login</a></p>
                <p><a href="{{ url_for('signup_as') }}">Back to Role Selection</a></p>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Success/Error Popup Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-4">
                    <div id="modalIcon" class="mb-3"></div>
                    <h5 id="modalTitle" class="mb-3"></h5>
                    <p id="modalMessage" class="mb-4"></p>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalButton">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Typing tooltips functionality
        let currentTooltip = null;

        function createTooltip(element, text) {
            // Remove any existing tooltips first
            const existingTooltips = document.querySelectorAll('.typing-tooltip');
            existingTooltips.forEach(tooltip => {
                if (tooltip.parentNode) {
                    tooltip.parentNode.removeChild(tooltip);
                }
            });
            
            const tooltip = document.createElement('div');
            tooltip.className = 'typing-tooltip';
            tooltip.textContent = text;
            
            const rect = element.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
            
            tooltip.style.position = 'absolute';
            tooltip.style.left = (rect.left + scrollLeft) + 'px';
            tooltip.style.top = (rect.bottom + scrollTop + 10) + 'px';
            tooltip.style.zIndex = '10000';
            
            document.body.appendChild(tooltip);
            
            // Show tooltip with animation
            setTimeout(() => {
                tooltip.classList.add('show');
            }, 10);
            
            return tooltip;
        }

        function hideTooltip() {
            if (currentTooltip) {
                currentTooltip.classList.remove('show');
                setTimeout(() => {
                    if (currentTooltip && currentTooltip.parentNode) {
                        currentTooltip.parentNode.removeChild(currentTooltip);
                    }
                    currentTooltip = null;
                }, 300);
            }
        }

        // Add event listeners to all form inputs with data-tooltip
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('[data-tooltip]');
            
            inputs.forEach((input, index) => {
                // Add new event listeners with proper scope
                input.addEventListener('focus', function(e) {
                    e.stopPropagation();
                    hideTooltip();
                    const tooltipText = this.getAttribute('data-tooltip');
                    if (tooltipText) {
                        currentTooltip = createTooltip(this, tooltipText);
                        // Store reference to the input that owns this tooltip
                        currentTooltip.ownerInput = this;
                    }
                });
                
                input.addEventListener('blur', function(e) {
                    e.stopPropagation();
                    setTimeout(() => {
                        // Only hide if this input owns the current tooltip
                        if (currentTooltip && currentTooltip.ownerInput === this) {
                            hideTooltip();
                        }
                    }, 200);
                });
                
                input.addEventListener('input', function(e) {
                    e.stopPropagation();
                    // Only update if this input owns the current tooltip
                    if (currentTooltip && currentTooltip.ownerInput === this) {
                        const tooltipText = this.getAttribute('data-tooltip');
                        if (tooltipText && currentTooltip.textContent !== tooltipText) {
                            currentTooltip.textContent = tooltipText;
                        }
                    }
                });
            });
            
            // Hide tooltip when clicking outside
            document.addEventListener('click', function(e) {
                if (!e.target.hasAttribute('data-tooltip')) {
                    hideTooltip();
                }
            });
        });

        // Enhanced form submission with popup notifications
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            submitBtn.disabled = true;
            
            // Create FormData
            const formData = new FormData(this);
            
            // Submit form
            fetch(window.location.href, {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(html => {
                // Parse response to check for success/error
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const alerts = doc.querySelectorAll('.alert');
                
                if (alerts.length > 0) {
                    const alert = alerts[0];
                    const isSuccess = alert.classList.contains('alert-success');
                    const message = alert.textContent.trim();
                    
                    showNotificationPopup(
                        isSuccess ? 'success' : 'error',
                        isSuccess ? 'Registration Successful!' : 'Registration Failed',
                        message,
                        isSuccess
                    );
                    
                    if (isSuccess) {
                        // Reset form on success
                        this.reset();
                        // Redirect after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/login-patient';
                        }, 3000);
                    }
                } else {
                    // Check if redirected (successful registration)
                    if (html.includes('login') || html.includes('dashboard')) {
                        showNotificationPopup(
                            'success',
                            'Registration Successful!',
                            'Your patient account has been created successfully. You can now login with your credentials.',
                            true
                        );
                        
                        setTimeout(() => {
                            window.location.href = '/login-patient';
                        }, 3000);
                    } else {
                        showNotificationPopup(
                            'error',
                            'Registration Failed',
                            'An unexpected error occurred. Please try again.',
                            false
                        );
                    }
                }
            })
            .catch(error => {
                showNotificationPopup(
                    'error',
                    'Network Error',
                    'Unable to connect to the server. Please check your internet connection and try again.',
                    false
                );
            })
            .finally(() => {
                // Reset button state
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        });
        
        function showNotificationPopup(type, title, message, isSuccess) {
            const modal = document.getElementById('notificationModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButton = document.getElementById('modalButton');
            
            // Set icon and colors based on type
            if (type === 'success') {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745;"><i class="fas fa-check-circle"></i></div>';
                modalTitle.style.color = '#28a745';
                modalButton.className = 'btn btn-success';
                modalButton.textContent = 'Continue';
            } else {
                modalIcon.innerHTML = '<div style="font-size: 4rem; color: #dc3545;"><i class="fas fa-exclamation-circle"></i></div>';
                modalTitle.style.color = '#dc3545';
                modalButton.className = 'btn btn-danger';
                modalButton.textContent = 'Try Again';
            }
            
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            // Show modal
            const bsModal = new bootstrap.Modal(modal);
            bsModal.show();
            
            // Add success animation
            if (isSuccess) {
                setTimeout(() => {
                    modalIcon.innerHTML = '<div style="font-size: 4rem; color: #28a745; animation: bounce 0.6s;"><i class="fas fa-check-circle"></i></div>';
                }, 100);
            }
        }
        
        // Add bounce animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 20%, 60%, 100% { transform: translateY(0); }
                40% { transform: translateY(-20px); }
                80% { transform: translateY(-10px); }
            }
            
            .modal-content {
                border-radius: 15px;
                overflow: hidden;
            }
            
            .modal-body {
                background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
