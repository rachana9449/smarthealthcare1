{% extends "base_clean.html" %}

{% block title %}Submit Feedback{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-star"></i> Submit Feedback</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <h5>Consultation with Dr. {{ consultation.doctor_name }}</h5>
                    <p class="mb-0"><small>Date: {{ consultation.consultation_date }}</small></p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="rating" class="form-label">Rating</label>
                        <div class="rating-stars">
                            <input type="radio" name="rating" value="5" id="star5" required>
                            <label for="star5"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" name="rating" value="4" id="star4">
                            <label for="star4"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" name="rating" value="3" id="star3">
                            <label for="star3"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" name="rating" value="2" id="star2">
                            <label for="star2"><i class="fas fa-star"></i></label>
                            
                            <input type="radio" name="rating" value="1" id="star1">
                            <label for="star1"><i class="fas fa-star"></i></label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="comment" class="form-label">Your Feedback</label>
                        <textarea class="form-control" id="comment" name="comment" rows="5" 
                                  placeholder="Share your experience with the doctor..." required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-paper-plane"></i> Submit Feedback
                        </button>
                        <a href="{{ url_for('consultation_history') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back to History
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.rating-stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-end;
    font-size: 2rem;
}

.rating-stars input {
    display: none;
}

.rating-stars label {
    color: #ddd;
    cursor: pointer;
    padding: 0 5px;
}

.rating-stars input:checked ~ label,
.rating-stars label:hover,
.rating-stars label:hover ~ label {
    color: #ffc107;
}
</style>
{% endblock %}
